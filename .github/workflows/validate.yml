name: Validate SOC Documentation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Validate Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          MISSING=0
          for f in README.md CONTRIBUTING.md SECURITY.md; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              MISSING=1
            else
              echo "OK: $f"
            fi
          done
          exit $MISSING

      - name: Validate YAML files
        run: |
          pip install pyyaml -q
          python3 -c "
          import os, sys, yaml
          errors = []
          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d != '.git']
              for f in files:
                  if f.endswith(('.yml', '.yaml')):
                      path = os.path.join(root, f)
                      try:
                          yaml.safe_load(open(path))
                      except yaml.YAMLError as e:
                          errors.append(str(e))
          if errors:
              for e in errors: print('YAML ERROR:', e)
              sys.exit(1)
          print('All YAML files valid')
          "

      - name: Check markdown files are non-empty
        continue-on-error: true
        run: |
          find . -name "*.md" -not -path "./.git/*" -exec wc -c {} + | sort -n
          echo "Markdown scan complete"
